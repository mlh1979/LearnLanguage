<!DOCTYPE html>
<html lang="en">
<head>

        #user-status { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .page { padding: 20px; min-height: 400px; }
        .hidden { display: none !important; }
        .btn-grid { display: flex; flex-direction: column; gap: 12px; padding: 20px 0; }
        .menu-btn { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 12px; padding: 16px 20px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .menu-btn:hover:not(:disabled) { background: #eef1ff; border-color: #4a6cf7; transform: translateY(-1px); }
        .menu-btn:active:not(:disabled) { transform: translateY(0); }
        .menu-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-en { font-size: 16px; font-weight: 600; color: #333; }
        .btn-zh { font-size: 13px; color: #6366f1; }
        .btn-ms { font-size: 12px; color: #888; font-style: italic; }
        .quit-btn .btn-en { color: #e74c3c; }
        h2 { font-size: 22px; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        input[type="text"] { width: 100%; padding: 14px 16px; font-size: 18px; border: 2px solid #e0e0e0; border-radius: 10px; text-align: center; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #4a6cf7; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        .action-btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: #4a6cf7; color: white; transition: background 0.2s; min-width: 120px; }
        .action-btn:hover { background: #3b5de7; }
        .action-btn.primary { background: #10b981; }
        .action-btn.primary:hover { background: #059669; }
        .action-btn.secondary { background: #6b7280; }
        .action-btn.secondary:hover { background: #4b5563; }
        .back-btn { width: 100%; margin-top: 10px; }
        #user-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .user-btn { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 10px; padding: 14px 20px; cursor: pointer; font-size: 16px; font-weight: 500; text-align: left; transition: all 0.2s; width: 100%; }
        .user-btn:hover { background: #eef1ff; border-color: #4a6cf7; }
        .user-btn span { color: #888; font-size: 13px; font-weight: 400; }
        .no-users { text-align: center; color: #888; padding: 20px; }
        .status-badge { text-align: center; font-size: 12px; color: #888; margin-bottom: 10px; }
        .word-display { font-size: 36px; font-weight: 700; text-align: center; padding: 20px 0 10px; color: #1a1a2e; }
        .translate-ms { font-size: 22px; text-align: center; color: #10b981; padding: 8px 0; }
        .translate-zh { font-size: 22px; text-align: center; color: #3b82f6; padding: 4px 0 12px; }
        .definition { font-size: 14px; text-align: center; color: #666; padding: 10px 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 16px; line-height: 1.5; }
        .answer-box { background: #fef3c7; border-radius: 10px; padding: 16px 20px; font-size: 18px; text-align: center; line-height: 1.6; margin: 12px 0; }
        .counter { text-align: center; font-size: 14px; color: #888; margin-bottom: 5px; }
        .time-info { text-align: center; font-size: 12px; color: #aaa; margin: 8px 0 0; }
        #empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; }
        .empty-msg { font-size: 20px; text-align: center; color: #555; line-height: 1.6; margin-bottom: 24px; white-space: pre-line; }

        .data-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }

</head>

// Data layer (localStorage)
function getUsers() {
    try { return JSON.parse(localStorage.getItem('el_users') || '{}'); } catch { return {}; }
}
function saveUsers(users) { localStorage.setItem('el_users', JSON.stringify(users)); }
function getUser(name) {
    const users = getUsers();
    return users[name] || null;
}
function createUser(name) {
    const users = getUsers();
    users[name] = { name, words: [] };
    saveUsers(users);
}
function deleteUser(name) {
    const users = getUsers();
    delete users[name];
    saveUsers(users);
}
function addWord(username, entry) {
    const users = getUsers();
    if (!users[username]) return;
    users[username].words.push(entry);
    saveUsers(users);
}

    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if (id === 'menu') updateMenuButtons();
    if (id === 'select-user') loadUserList();
}

function updateMenuButtons() {
    ['btn-learn', 'btn-test', 'btn-review'].forEach(id => {
        document.getElementById(id).disabled = !currentUser;
    });
    document.getElementById('user-status').textContent = currentUser
        ? `Logged in as: ${currentUser}`
        : 'No user selected';
    document.getElementById('data-btns').classList.toggle('hidden', !currentUser);
}

// Create User
function createUserAction() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) return;
    if (getUser(name)) { alert('User already exists!'); return; }
    createUser(name);
    currentUser = name;
    document.getElementById('new-name').value = '';
    showPage('menu');
}

// Select User
function loadUserList() {
    const users = getUsers();
    const list = document.getElementById('user-list');
    const names = Object.keys(users);
    if (!names.length) {
        list.innerHTML = '<p class="no-users">No users found. Create one first.</p>';
        return;
    }
    list.innerHTML = names.map(n => {
        const count = users[n].words.length;
        return `<button class="user-btn" onclick="selectUser('${n}')">${n} <span>(${count} words)</span>
            <button class="delete-btn" onclick="event.stopPropagation();deleteUserAction('${n}')">✕</button>
        </button>`;
    }).join('');
}

function selectUser(name) {
    currentUser = name;
    showPage('menu');
}

function deleteUserAction(name) {
    if (!confirm(`Delete user "${name}" and all their data?`)) return;
    deleteUser(name);
    if (currentUser === name) currentUser = null;
    loadUserList();
}

// Learn
function doLearn() {
    showPage('learn');
    const userData = getUser(currentUser);
    if (!userData) return;
    const learned = new Set(userData.words.map(w => w.word));
    const available = Object.keys(LOCAL_DICT).filter(w => !learned.has(w));
    if (!available.length) { showEmpty('You\'ve learned all words!\n已全部学完!'); return; }

    currentWord = available[Math.floor(Math.random() * available.length)];
    const entry = LOCAL_DICT[currentWord];
    document.getElementById('learn-word').textContent = currentWord.charAt(0).toUpperCase() + currentWord.slice(1);
    document.getElementById('learn-malay').textContent = entry.malay;
    document.getElementById('learn-chinese').textContent = entry.chinese;
    document.getElementById('learn-definition').textContent = entry.definition;
}

function saveAndBack() {
    if (currentWord && currentUser) {
        const entry = LOCAL_DICT[currentWord];
        addWord(currentUser, {
            word: currentWord,
            malay: entry.malay,
            chinese: entry.chinese,
            definition: entry.definition,
            date: new Date().toISOString().slice(0, 19).replace('T', ' ')
        });
    }
    showPage('menu');
}

// Test
function doTest() {
    showPage('test');
    document.getElementById('test-answer').classList.add('hidden');
    document.getElementById('test-answer').textContent = '';

    const userData = getUser(currentUser);
    if (!userData) return;
    if (!userData.words.length) {
        showEmpty('No words learned yet.\n还没有学过的单词!');
        return;
    }
    const w = userData.words[Math.floor(Math.random() * userData.words.length)];
    testData = w;
    document.getElementById('test-word').textContent = w.word.charAt(0).toUpperCase() + w.word.slice(1);
}

function showTestAnswer() {
    const a = document.getElementById('test-answer');
    a.textContent = `Malay: ${testData.malay}\nChinese: ${testData.chinese}`;
    a.classList.remove('hidden');
}

// Review
function doReview() {
    const userData = getUser(currentUser);
    if (!userData) return;
    const today = new Date().toISOString().slice(0, 10);
    reviewWords = userData.words.filter(w => (w.date || '').startsWith(today));
    if (!reviewWords.length) {
        showEmpty('No words learned today.\n今天没有学过的单词。');
        return;
    }
    reviewIndex = 0;
    showPage('review');
    showReviewWord();
}

function showReviewWord() {
    const w = reviewWords[reviewIndex];
    document.getElementById('review-counter').textContent = `${reviewIndex + 1} / ${reviewWords.length}`;
    document.getElementById('review-word').textContent = w.word.charAt(0).toUpperCase() + w.word.slice(1);
    document.getElementById('review-answer').classList.add('hidden');
    document.getElementById('review-time').textContent = `Learned at: ${w.date}`;
    reviewData = w;
}

let reviewData = {};

function showReviewAnswer() {
    const a = document.getElementById('review-answer');
    a.textContent = `Malay: ${reviewData.malay}\nChinese: ${reviewData.chinese}`;
    a.classList.remove('hidden');
}

function reviewNext() {
    reviewIndex++;
    if (reviewIndex < reviewWords.length) {
        showReviewWord();
    } else {
        showEmpty('All reviewed!\n已全部复习!');
    }
}

// Utility
function showEmpty(msg) {
    document.getElementById('empty-msg').textContent = msg;
    showPage('empty');
}

function speakWord(text) {
    if (!text) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.85;
    speechSynthesis.speak(u);
}

// Bind events
document.getElementById('new-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') createUserAction();
});

// Make createUser available
window.createUser = createUserAction;

// Export/Import
function exportUser() {
    if (!currentUser) { alert('Please select a user first!'); return; }
    const data = getUser(currentUser);
    if (!data) return;
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentUser}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importUser(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.name || !Array.isArray(data.words)) {
                alert('Invalid file format!');
                return;
            }
            const users = getUsers();
            users[data.name] = data;
            saveUsers(users);
            currentUser = data.name;
            updateMenuButtons();
            alert(`Imported user "${data.name}" with ${data.words.length} words!`);
        } catch {
            alert('Failed to read file!');
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// Init
updateMenuButtons();
</script>
</body>
</html>
