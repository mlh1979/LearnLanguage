<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4a6cf7">
    <title>Language Learning</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; color: #333; }
        #app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        #app-header { background: linear-gradient(135deg, #4a6cf7, #6366f1); color: white; padding: 20px; text-align: center; }
        #app-header h1 { font-size: 24px; font-weight: 700; }
        #user-status { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .page { padding: 20px; min-height: 400px; }
        .hidden { display: none !important; }
        .btn-grid { display: flex; flex-direction: column; gap: 12px; padding: 20px 0; }
        .menu-btn { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 12px; padding: 16px 20px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .menu-btn:hover:not(:disabled) { background: #eef1ff; border-color: #4a6cf7; transform: translateY(-1px); }
        .menu-btn:active:not(:disabled) { transform: translateY(0); }
        .menu-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-en { font-size: 16px; font-weight: 600; color: #333; }
        .btn-zh { font-size: 13px; color: #6366f1; }
        .btn-ms { font-size: 12px; color: #888; font-style: italic; }
        .quit-btn .btn-en { color: #e74c3c; }
        h2 { font-size: 22px; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        input[type="text"] { width: 100%; padding: 14px 16px; font-size: 18px; border: 2px solid #e0e0e0; border-radius: 10px; text-align: center; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #4a6cf7; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        .action-btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: #4a6cf7; color: white; transition: background 0.2s; min-width: 120px; }
        .action-btn:hover { background: #3b5de7; }
        .action-btn.primary { background: #10b981; }
        .action-btn.primary:hover { background: #059669; }
        .action-btn.secondary { background: #6b7280; }
        .action-btn.secondary:hover { background: #4b5563; }
        .back-btn { width: 100%; margin-top: 10px; }
        #user-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .user-btn { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 10px; padding: 14px 20px; cursor: pointer; font-size: 16px; font-weight: 500; text-align: left; transition: all 0.2s; width: 100%; }
        .user-btn:hover { background: #eef1ff; border-color: #4a6cf7; }
        .user-btn span { color: #888; font-size: 13px; font-weight: 400; }
        .no-users { text-align: center; color: #888; padding: 20px; }
        .status-badge { text-align: center; font-size: 12px; color: #888; margin-bottom: 10px; }
        .word-display { font-size: 36px; font-weight: 700; text-align: center; padding: 20px 0 10px; color: #1a1a2e; }
        .definition { font-size: 14px; text-align: center; color: #666; padding: 10px 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 16px; line-height: 1.5; }
        .sentence-panel { margin: 12px 0; }
        .sentence-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 6px; }
        .sentence-lang { font-size: 11px; color: #6366f1; font-weight: 700; min-width: 24px; }
        .sentence-text { flex: 1; font-size: 14px; color: #444; line-height: 1.4; }
        .sentence-btn { background: none; border: 1px solid #d0d0d0; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px; color: #6366f1; white-space: nowrap; line-height: 1; }
        .sentence-btn:hover { background: #eef1ff; border-color: #6366f1; }
        .answer-box { background: #fef3c7; border-radius: 10px; padding: 16px 20px; font-size: 18px; text-align: center; line-height: 1.6; margin: 12px 0; }
        .counter { text-align: center; font-size: 14px; color: #888; margin-bottom: 5px; }
        .time-info { text-align: center; font-size: 12px; color: #aaa; margin: 8px 0 0; }
        #empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; }
        .empty-msg { font-size: 20px; text-align: center; color: #555; line-height: 1.6; margin-bottom: 24px; white-space: pre-line; }
        .delete-btn { background: none; border: none; color: #e74c3c; font-size: 12px; cursor: pointer; padding: 2px 6px; margin-left: 8px; }
        .data-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
        .data-btns.hidden { display: none; }
        .data-btn { padding: 10px 20px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fafafa; cursor: pointer; font-size: 13px; color: #555; white-space: pre-line; text-align: center; }
        .data-btn:hover { background: #eef1ff; border-color: #4a6cf7; }
        .lang-btn { padding: 10px 16px; border: 2px solid #e9ecef; border-radius: 10px; background: #f8f9fa; cursor: pointer; font-size: 14px; font-weight: 600; color: #333; transition: all 0.2s; min-width: 100px; text-align: center; }
        .lang-btn:hover { background: #eef1ff; border-color: #4a6cf7; }
        .lang-btn.active { background: #eef1ff; border-color: #4a6cf7; color: #4a6cf7; }
        .lang-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
        .lang-label { font-size: 12px; color: #888; text-align: center; margin-bottom: 6px; font-weight: 600; }
        .section-label { font-size: 13px; color: #888; font-weight: 600; margin: 16px 0 8px; text-align: center; }
        #update-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #4a6cf7; color: white; padding: 12px 20px; text-align: center; z-index: 9999; }
        #update-banner button { background: white; color: #4a6cf7; border: none; padding: 6px 16px; border-radius: 6px; font-weight: 600; margin-left: 10px; cursor: pointer; }
        @media (max-width: 480px) { #app { max-width: 100%; } .word-display { font-size: 28px; } .action-btn { min-width: 100px; padding: 10px 16px; font-size: 14px; } }
    </style>
</head>
<body>
<div id="app">
    <header id="app-header">
        <h1 id="app-title-text">Language Learning <span id="version-badge"></span></h1>
        <div id="user-status">No user selected</div>
    </header>

    <!-- Menu -->
    <div id="menu" class="page">
        <div class="btn-grid">
            <button class="menu-btn" id="menu-btn-settings" onclick="showPage('settings')">
                <span class="btn-en">Settings</span>
                <span class="btn-zh">设置</span>
                <span class="btn-ms">Tetapan</span>
            </button>
            <button class="menu-btn" id="menu-btn-create" onclick="showPage('create-user')" style="display:none;">
                <span class="btn-en">Create New User</span>
                <span class="btn-zh">创建用户</span>
                <span class="btn-ms">Cipta Pengguna</span>
            </button>
            <button class="menu-btn" id="menu-btn-select" onclick="showPage('select-user')" style="display:none;">
                <span class="btn-en">Select User</span>
                <span class="btn-zh">选择用户</span>
                <span class="btn-ms">Pilih Pengguna</span>
            </button>
            <button class="menu-btn" id="btn-learn" onclick="doLearn()" disabled>
                <span class="btn-en">Learn a Word</span>
                <span class="btn-zh">学习单词</span>
                <span class="btn-ms">Belajar Perkataan</span>
            </button>
            <button class="menu-btn" id="btn-test" onclick="doTest()" disabled>
                <span class="btn-en">Test</span>
                <span class="btn-zh">测试</span>
                <span class="btn-ms">Ujian</span>
            </button>
            <button class="menu-btn" id="btn-review" onclick="doReview()" disabled>
                <span class="btn-en">Review Today</span>
                <span class="btn-zh">今日复习</span>
                <span class="btn-ms">Semak Hari Ini</span>
            </button>
            <button class="menu-btn quit-btn" onclick="alert('Close the browser tab to quit.')">
                <span class="btn-en">Quit</span>
                <span class="btn-zh">退出</span>
                <span class="btn-ms">Keluar</span>
            </button>
        </div>
        <div id="data-btns" class="data-btns hidden">
            <button class="data-btn" onclick="exportUser()">Export Data</button>
            <button class="data-btn" onclick="document.getElementById('import-file').click()">Import Data</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importUser(event)">
        </div>
    </div>

    <!-- Settings -->
    <div id="settings" class="page hidden">
        <h2>Settings</h2>
        <p class="subtitle">设置 / Tetapan</p>
        <div class="lang-selector" id="lang-settings">
            <div class="lang-label">Learn Language</div>
            <div class="lang-row" id="lang-learn-row"></div>
            <div class="lang-label">Translate to</div>
            <div class="lang-row" id="lang-trans1-row"></div>
            <div class="lang-label">Translate to (2nd)</div>
            <div class="lang-row" id="lang-trans2-row"></div>
        </div>
        <div class="section-label">User Management</div>
        <div class="btn-grid" style="padding:0;">
            <button class="menu-btn" onclick="showPage('create-user')">
                <span class="btn-en">Create New User</span>
                <span class="btn-zh">创建用户</span>
            </button>
            <button class="menu-btn" onclick="showPage('select-user')">
                <span class="btn-en">Select User</span>
                <span class="btn-zh">选择用户</span>
            </button>
        </div>
        <button class="action-btn secondary back-btn" style="margin-top:20px;" onclick="showPage('menu')">Back to Menu</button>
    </div>

    <!-- Create User -->
    <div id="create-user" class="page hidden">
        <h2>Create New User</h2>
        <p class="subtitle">创建用户 / Cipta Pengguna</p>
        <input type="text" id="new-name" placeholder="Enter your name" onkeydown="if(event.key==='Enter')createUserAction()">
        <div class="btn-row">
            <button class="action-btn" onclick="createUserAction()">Create</button>
            <button class="action-btn secondary" onclick="showPage('settings')">Back</button>
        </div>
    </div>

    <!-- Select User -->
    <div id="select-user" class="page hidden">
        <h2>Select User</h2>
        <p class="subtitle">选择用户 / Pilih Pengguna</p>
        <div id="user-list"></div>
        <div class="btn-row">
            <button class="action-btn secondary" onclick="showPage('settings')">Back</button>
        </div>
    </div>

    <!-- Learn -->
    <div id="learn" class="page hidden">
        <div id="learn-word" class="word-display"></div>
        <div id="learn-def" class="definition"></div>
        <div id="learn-sentences" class="sentence-panel"></div>
        <div class="btn-row">
            <button class="action-btn" onclick="doLearn()">Next Word</button>
            <button class="action-btn primary" onclick="saveAndBack()">Save & Back</button>
        </div>
        <button class="action-btn secondary back-btn" onclick="showPage('menu')">Back to Menu</button>
    </div>

    <!-- Test -->
    <div id="test" class="page hidden">
        <div class="status-badge">Test</div>
        <div id="test-word" class="word-display"></div>
        <div id="test-answer" class="answer-box hidden"></div>
        <div id="test-sentences" class="sentence-panel hidden"></div>
        <div class="btn-row">
            <button class="action-btn" onclick="showTestAnswer()">Show Answer</button>
        </div>
        <div class="btn-row">
            <button class="action-btn primary" onclick="doTest()">Next Word</button>
            <button class="action-btn secondary" onclick="showPage('menu')">Back to Menu</button>
        </div>
    </div>

    <!-- Review Today -->
    <div id="review" class="page hidden">
        <div class="status-badge">Review Today</div>
        <div id="review-counter" class="counter"></div>
        <div id="review-word" class="word-display"></div>
        <div id="review-answer" class="answer-box hidden"></div>
        <div id="review-sentences" class="sentence-panel hidden"></div>
        <div id="review-time" class="time-info"></div>
        <div class="btn-row">
            <button class="action-btn" onclick="showReviewAnswer()">Show Answer</button>
        </div>
        <div class="btn-row">
            <button class="action-btn primary" id="btn-review-next" onclick="reviewNext()">Next Word</button>
            <button class="action-btn secondary" onclick="showPage('menu')">Back to Menu</button>
        </div>
    </div>

    <!-- Empty state -->
    <div id="empty" class="page hidden">
        <div id="empty-msg" class="empty-msg"></div>
        <button class="action-btn secondary" onclick="showPage('menu')">Back to Menu</button>
    </div>
</div>

<div id="update-banner">
    New version available! <button onclick="installUpdate()">Update Now</button>
</div>

<script>
// ========= VERSION =========
const APP_VERSION = 'v2.0.0.1';
document.title = 'Language Learning (' + APP_VERSION + ')';
// ============================

const LANGS = {
    en: { name: 'English', native: 'English', tts: 'en-US' },
    zh: { name: 'Chinese', native: '中文', tts: 'zh-CN' },
    ms: { name: 'Malay', native: 'Bahasa Melayu', tts: 'ms-MY' },
    ta: { name: 'Tamil', native: 'தமிழ்', tts: 'ta-IN' },
    ja: { name: 'Japanese', native: '日本語', tts: 'ja-JP' },
};

const DICT = {
    "abandon": {
        definition: { en: "to leave something or someone behind", zh: "放弃", ms: "meninggalkan", ta: "கைவிடு", ja: "放棄する" },
        sentence: [
            { lang: 'en', text: "They had to abandon their plan due to bad weather." },
            { lang: 'zh', text: "由于天气不好，他们不得不放弃计划。" },
            { lang: 'ms', text: "Mereka terpaksa meninggalkan rancangan mereka kerana cuaca buruk." },
            { lang: 'ta', text: "கெட்ட வானிலை காரணமாக அவர்கள் தங்கள் திட்டத்தை கைவிட வேண்டியிருந்தது." },
            { lang: 'ja', text: "悪天候のため、計画を諦めなければならなかった。" },
        ],
        translations: { zh: "放弃", ms: "meninggalkan", ta: "கைவிடு", ja: "放棄する" },
    },
    "absorb": {
        definition: { en: "to take in or soak up", zh: "吸收", ms: "menyerap", ta: "உறிஞ்சு", ja: "吸収する" },
        sentence: [
            { lang: 'en', text: "Plants absorb water through their roots." },
            { lang: 'zh', text: "植物通过根部吸收水分。" },
            { lang: 'ms', text: "Tumbuhan menyerap air melalui akarnya." },
            { lang: 'ta', text: "தாவரங்கள் தங்கள் வேர்கள் மூலம் தண்ணீரை உறிஞ்சுகின்றன." },
            { lang: 'ja', text: "植物は根から水を吸収する。" },
        ],
        translations: { zh: "吸收", ms: "menyerap", ta: "உறிஞ்சு", ja: "吸収する" },
    },
    "achieve": {
        definition: { en: "to successfully bring about a result", zh: "实现", ms: "mencapai", ta: "சாதி", ja: "達成する" },
        sentence: [
            { lang: 'en', text: "She worked hard to achieve her goals." },
            { lang: 'zh', text: "她努力工作以实现目标。" },
            { lang: 'ms', text: "Dia bekerja keras untuk mencapai matlamatnya." },
            { lang: 'ta', text: "அவர் தனது இலக்குகளை அடைய கடுமையாக உழைத்தார்." },
            { lang: 'ja', text: "彼女は目標を達成するために一生懸命働いた。" },
        ],
        translations: { zh: "实现", ms: "mencapai", ta: "சாதி", ja: "達成する" },
    },
    "balance": {
        definition: { en: "an even distribution of weight", zh: "平衡", ms: "keseimbangan", ta: "சமநிலை", ja: "バランス" },
        sentence: [
            { lang: 'en', text: "Good balance is important in life." },
            { lang: 'zh', text: "生活中良好的平衡很重要。" },
            { lang: 'ms', text: "Keseimbangan yang baik adalah penting dalam kehidupan." },
            { lang: 'ta', text: "வாழ்க்கையில் நல்ல சமநிலை முக்கியம்." },
            { lang: 'ja', text: "人生では良いバランスが重要です。" },
        ],
        translations: { zh: "平衡", ms: "keseimbangan", ta: "சமநிலை", ja: "バランス" },
    },
    "brilliant": {
        definition: { en: "very bright or intelligent", zh: "杰出的", ms: "cemerlang", ta: "அற்புதமான", ja: "素晴らしい" },
        sentence: [
            { lang: 'en', text: "She had a brilliant idea for the project." },
            { lang: 'zh', text: "她为这个项目想出了一个出色的主意。" },
            { lang: 'ms', text: "Dia mempunyai idea yang cemerlang untuk projek itu." },
            { lang: 'ta', text: "அவருக்கு திட்டத்திற்கு ஒரு அற்புதமான யோசனை இருந்தது." },
            { lang: 'ja', text: "彼女はプロジェクトに素晴らしいアイデアを持っていた。" },
        ],
        translations: { zh: "杰出的", ms: "cemerlang", ta: "அற்புதமான", ja: "素晴らしい" },
    },
    "courage": {
        definition: { en: "the ability to face danger or fear", zh: "勇气", ms: "keberanian", ta: "தைரியம்", ja: "勇気" },
        sentence: [
            { lang: 'en', text: "It takes courage to speak in public." },
            { lang: 'zh', text: "公开演讲需要勇气。" },
            { lang: 'ms', text: "Ia memerlukan keberanian untuk bercakap di khalayak ramai." },
            { lang: 'ta', text: "பொதுவில் பேச தைரியம் தேவை." },
            { lang: 'ja', text: "公衆の前で話すには勇気が必要だ。" },
        ],
        translations: { zh: "勇气", ms: "keberanian", ta: "தைரியம்", ja: "勇気" },
    },
    "desire": {
        definition: { en: "a strong feeling of wanting", zh: "渴望", ms: "keinginan", ta: "விருப்பம்", ja: "欲望" },
        sentence: [
            { lang: 'en', text: "She has a strong desire to travel." },
            { lang: 'zh', text: "她强烈渴望旅行。" },
            { lang: 'ms', text: "Dia mempunyai keinginan yang kuat untuk melancong." },
            { lang: 'ta', text: "அவருக்கு பயணம் செய்ய வலுவான விருப்பம் உள்ளது." },
            { lang: 'ja', text: "彼女は旅行したいという強い欲求を持っている。" },
        ],
        translations: { zh: "渴望", ms: "keinginan", ta: "விருப்பம்", ja: "欲望" },
    },
    "elegant": {
        definition: { en: "graceful and stylish", zh: "优雅的", ms: "anggun", ta: "நளினமான", ja: "優雅な" },
        sentence: [
            { lang: 'en', text: "She wore an elegant dress to the party." },
            { lang: 'zh', text: "她穿了一件优雅的裙子去参加派对。" },
            { lang: 'ms', text: "Dia memakai gaun yang anggun ke parti itu." },
            { lang: 'ta', text: "அவர் விருந்துக்கு நளினமான உடை அணிந்தார்." },
            { lang: 'ja', text: "彼女はパーティーにエレガントなドレスを着ていった。" },
        ],
        translations: { zh: "优雅的", ms: "anggun", ta: "நளினமான", ja: "優雅な" },
    },
    "flourish": {
        definition: { en: "to grow or develop in a healthy way", zh: "繁荣", ms: "berkembang", ta: "வளர்ச்சி", ja: "繁栄する" },
        sentence: [
            { lang: 'en', text: "The garden began to flourish in spring." },
            { lang: 'zh', text: "花园在春天开始繁荣生长。" },
            { lang: 'ms', text: "Taman mula berkembang pada musim bunga." },
            { lang: 'ta', text: "வசந்த காலத்தில் தோட்டம் வளரத் தொடங்கியது." },
            { lang: 'ja', text: "春になって庭が栄え始めた。" },
        ],
        translations: { zh: "繁荣", ms: "berkembang", ta: "வளர்ச்சி", ja: "繁栄する" },
    },
    "gentle": {
        definition: { en: "mild in temperament; kind", zh: "温柔的", ms: "lembut", ta: "மென்மையான", ja: "優しい" },
        sentence: [
            { lang: 'en', text: "She spoke in a gentle voice." },

function getTranslation(wordKey, targetLang) {
    const entry = DICT[wordKey];
    if (!entry) return '';
    if (entry.translations && entry.translations[targetLang]) return entry.translations[targetLang];
    return entry.definition[targetLang] || '';
}

const DEFAULT_SETTINGS = { learnLang: 'en', transLang1: 'zh', transLang2: 'ms' };

function getCurrentSettings() {
    const u = getUser(currentUser);
    return (u && u.settings) ? u.settings : DEFAULT_SETTINGS;
}

function saveSettings(s) {
    const u = getUser(currentUser);
    if (!u) return;
    u.settings = s;
    const all = getUsers();
    all[currentUser] = u;
    saveUsers(all);
}

// Data layer
function getUsers() {
    try { return JSON.parse(localStorage.getItem('el_users') || '{}'); } catch { return {}; }
}
function saveUsers(data) { localStorage.setItem('el_users', JSON.stringify(data)); }
function getUser(name) { return getUsers()[name] || null; }
function createUser(name) {
    const u = getUsers();
    u[name] = { name, settings: { ...DEFAULT_SETTINGS }, words: [] };
    saveUsers(u);
}
function deleteUser(name) {
    const u = getUsers();
    delete u[name];
    saveUsers(u);
}
function addWord(username, wordKey) {
    const u = getUsers();
    if (!u[username]) return;
    if (u[username].words.find(w => w.word === wordKey)) return;
    u[username].words.push({ word: wordKey, date: new Date().toISOString().slice(0, 19).replace('T', ' ') });
    saveUsers(u);
}

function getFileTimestamp() {
    const d = new Date();
    return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '_' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0') + String(d.getSeconds()).padStart(2,'0');
}

function downloadFile(data, filename) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}

function exportUser() {
    if (!currentUser) { alert('Please select a user first!'); return; }
    const data = getUser(currentUser);
    if (!data) return;
    downloadFile(data, `${currentUser}_${getFileTimestamp()}.json`);
}

function importUser(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.name || !Array.isArray(data.words)) { alert('Invalid file format!'); return; }
            const u = getUsers();
            if (!data.settings) data.settings = { ...DEFAULT_SETTINGS };
            u[data.name] = data;
            saveUsers(u);
            currentUser = data.name;
            localStorage.setItem('el_last_user', data.name);
            updateMenuButtons();
            renderLangSelectors();
        } catch { alert('Failed to read file!'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function autoRestore() {
    const last = localStorage.getItem('el_last_user');
    if (last && getUser(last)) {
        currentUser = last;
        updateMenuButtons();
        renderLangSelectors();
    }
}

// State
let currentUser = null;
let currentWord = null;
let testData = {};
let reviewWords = [];
let reviewIndex = 0;
let reviewData = {};
let _sentenceShuffle = {};

// Navigation
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if (id === 'menu') updateMenuButtons();
    if (id === 'select-user') loadUserList();
    if (id === 'settings') renderLangSelectors();
}

function updateMenuButtons() {
    const hasUsers = Object.keys(getUsers()).length > 0;
    document.getElementById('menu-btn-create').style.display = hasUsers ? 'none' : 'flex';
    document.getElementById('menu-btn-select').style.display = hasUsers ? 'none' : 'flex';
    ['btn-learn', 'btn-test', 'btn-review'].forEach(id => {
        document.getElementById(id).disabled = !currentUser;
    });
    document.getElementById('user-status').textContent = currentUser
        ? `Logged in as: ${currentUser}`
        : 'No user selected';
    document.getElementById('data-btns').classList.toggle('hidden', !currentUser);
    document.getElementById('lang-settings').classList.toggle('hidden', !currentUser);
    const settings = getCurrentSettings();
    const langName = LANGS[settings.learnLang] ? LANGS[settings.learnLang].name : 'Language';
    document.getElementById('app-title-text').innerHTML = `${langName} Learning <span id="version-badge">${'(' + APP_VERSION + ')'}</span>`;
    document.getElementById('version-badge').textContent = '(' + APP_VERSION + ')';
}

function createUserAction() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) return;
    if (getUser(name)) { alert('User already exists!'); return; }
    createUser(name);
    currentUser = name;
    localStorage.setItem('el_last_user', name);
    document.getElementById('new-name').value = '';
    updateMenuButtons();
    renderLangSelectors();
    showPage('menu');
}

function loadUserList() {
    const u = getUsers();
    const list = document.getElementById('user-list');
    const names = Object.keys(u);
    if (!names.length) {
        list.innerHTML = '<p class="no-users">No users found. Create one first.</p>';
        return;
    }
    list.innerHTML = names.map(n => {
        const count = u[n].words.length;
        return `<button class="user-btn" onclick="selectUser('${n}')">${n} <span>(${count} words)</span>
            <button class="delete-btn" onclick="event.stopPropagation();deleteUserAction('${n}')">✕</button>
        </button>`;
    }).join('');
}

function selectUser(name) {
    currentUser = name;
    localStorage.setItem('el_last_user', name);
    updateMenuButtons();
    renderLangSelectors();
    showPage('menu');
}

function deleteUserAction(name) {
    if (!confirm(`Delete user "${name}" and all their data?`)) return;
    deleteUser(name);
    if (currentUser === name) { currentUser = null; localStorage.removeItem('el_last_user'); }
    loadUserList();
}

// Language selectors
function renderLangSelectors() {
    if (!currentUser) return;
    const settings = getCurrentSettings();
    const langs = Object.keys(LANGS);

    function renderRow(containerId, selectedLang, prefix) {
        const container = document.getElementById(containerId);
        container.innerHTML = langs.map(lang =>
            `<button class="lang-btn ${selectedLang === lang ? 'active' : ''}" onclick="selectLang('${prefix}','${lang}')">${LANGS[lang].native}</button>`
        ).join('');
    }

    renderRow('lang-learn-row', settings.learnLang, 'learn');
    renderRow('lang-trans1-row', settings.transLang1, 'trans1');
    renderRow('lang-trans2-row', settings.transLang2, 'trans2');
}

function selectLang(prefix, lang) {
    const s = getCurrentSettings();
    if (prefix === 'learn') s.learnLang = lang;
    else if (prefix === 'trans1') s.transLang1 = lang;
    else if (prefix === 'trans2') s.transLang2 = lang;
    saveSettings(s);
    renderLangSelectors();
    updateMenuButtons();
}

// Learn
function doLearn() {
    saveCurrentWord();
    showPage('learn');
    if (!currentUser) return;
    const userData = getUser(currentUser);
    if (!userData) return;
    const learned = new Set(userData.words.map(w => w.word));
    const available = Object.keys(DICT).filter(w => !learned.has(w));
    if (!available.length) { showEmpty('You\'ve learned all words!\n已全部学完!'); return; }
    currentWord = available[Math.floor(Math.random() * available.length)];
    renderLearnPage();
}

function renderLearnPage() {
    const entry = DICT[currentWord];
    if (!entry) return;
    const settings = getCurrentSettings();
    document.getElementById('learn-word').textContent = currentWord.charAt(0).toUpperCase() + currentWord.slice(1);
    document.getElementById('learn-def').textContent = entry.definition[settings.learnLang] || '';
    renderSentences(currentWord, 'learn-sentences');
}

function escapeHtml(str) {
    return str.replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}

// Shared sentence renderer
function renderSentences(wordKey, containerId) {
    const entry = DICT[wordKey];
    if (!entry) { document.getElementById(containerId).innerHTML = ''; return; }
    const settings = getCurrentSettings();
    const learnLang = settings.learnLang;
    const container = document.getElementById(containerId);
    const sentences = _sentenceShuffle[containerId] || entry.sentence;

    let html = '';

    // Word sound
    const wordTts = LANGS[learnLang] ? LANGS[learnLang].tts : 'en-US';
    html += `<div class="sentence-row">
        <span class="sentence-lang">${LANGS[learnLang].native}</span>
        <span class="sentence-text">${escapeHtml(wordKey)}</span>
        <button class="sentence-btn" onclick="speakWord('${escapeHtml(wordKey)}','${wordTts}')">🔊</button>
    </div>`;

    const seenLangs = new Set();

    // Learn language sentence
    const learnSent = sentences.find(s => s.lang === learnLang);
    if (learnSent) {
        const tts = LANGS[learnLang].tts;
        html += `<div class="sentence-row">
            <span class="sentence-lang">${LANGS[learnLang].native}</span>
            <span class="sentence-text">${escapeHtml(learnSent.text)}</span>
            <button class="sentence-btn" onclick="speakWord('${escapeHtml(learnSent.text)}','${tts}')">🔊</button>
        </div>`;
        seenLangs.add(learnLang);
    }

    // Translation sentences
    for (const tLang of [settings.transLang1, settings.transLang2]) {
        if (seenLangs.size >= 3) break;
        const sent = sentences.find(s => s.lang === tLang);
        if (sent && !seenLangs.has(tLang)) {
            const tts = LANGS[tLang] ? LANGS[tLang].tts : 'en-US';
            html += `<div class="sentence-row">
                <span class="sentence-lang">${LANGS[tLang].native}</span>
                <span class="sentence-text">${escapeHtml(sent.text)}</span>
                <button class="sentence-btn" onclick="speakWord('${escapeHtml(sent.text)}','${tts}')">🔊</button>
            </div>`;
            seenLangs.add(tLang);
        }
    }

    // Fill with other langs
    for (const sent of sentences) {
        if (seenLangs.size >= 3) break;
        if (!seenLangs.has(sent.lang)) {
            const tts = LANGS[sent.lang] ? LANGS[sent.lang].tts : 'en-US';
            html += `<div class="sentence-row">
                <span class="sentence-lang">${LANGS[sent.lang].native}</span>
                <span class="sentence-text">${escapeHtml(sent.text)}</span>
                <button class="sentence-btn" onclick="speakWord('${escapeHtml(sent.text)}','${tts}')">🔊</button>
            </div>`;
            seenLangs.add(sent.lang);
        }
    }

    html += `<div style="text-align:center;margin-top:8px;">
        <button class="action-btn secondary" style="padding:8px 16px;font-size:13px;min-width:auto;" onclick="regenerateSentences('${wordKey}','${containerId}')">Regenerate Sentences</button>
    </div>`;

    container.innerHTML = html;
}

function regenerateSentences(wordKey, containerId) {
    const entry = DICT[wordKey];
    if (!entry || !entry.sentence) return;
    _sentenceShuffle[containerId] = [...entry.sentence].sort(() => Math.random() - 0.5);
    renderSentences(wordKey, containerId);
}

function saveCurrentWord() {
    if (currentWord && currentUser) addWord(currentUser, currentWord);
}

function saveAndBack() {
    saveCurrentWord();
    currentWord = null;
    showPage('menu');
}

// Test
function doTest() {
    showPage('test');
    document.getElementById('test-answer').classList.add('hidden');
    document.getElementById('test-answer').innerHTML = '';
    document.getElementById('test-sentences').classList.add('hidden');
    document.getElementById('test-sentences').innerHTML = '';

    const userData = getUser(currentUser);
    if (!userData) return;
    if (!userData.words.length) { showEmpty('No words learned yet.\n还没有学过的单词!'); return; }
    const w = userData.words[Math.floor(Math.random() * userData.words.length)];
    testData = w;
    document.getElementById('test-word').textContent = w.word.charAt(0).toUpperCase() + w.word.slice(1);
}

function showTestAnswer() {
    const a = document.getElementById('test-answer');
    const settings = getCurrentSettings();
    const tr1 = getTranslation(testData.word, settings.transLang1);
    const tr2 = getTranslation(testData.word, settings.transLang2);
    a.innerHTML = `${LANGS[settings.transLang1].native}: ${tr1}<br>${LANGS[settings.transLang2].native}: ${tr2}`;
    a.classList.remove('hidden');

    // Show sentences
    const panel = document.getElementById('test-sentences');
    panel.classList.remove('hidden');
    _sentenceShuffle['test-sentences'] = null; // reset shuffle on new word
    renderSentences(testData.word, 'test-sentences');
}

// Review
function doReview() {
    const userData = getUser(currentUser);
    if (!userData) return;
    const today = new Date().toISOString().slice(0, 10);
    reviewWords = userData.words.filter(w => (w.date || '').startsWith(today));
    if (!reviewWords.length) { showEmpty('No words learned today.\n今天没有学过的单词。'); return; }
    reviewIndex = 0;
    showPage('review');
    showReviewWord();
}

function showReviewWord() {
    const w = reviewWords[reviewIndex];
    document.getElementById('review-counter').textContent = `${reviewIndex + 1} / ${reviewWords.length}`;
    document.getElementById('review-word').textContent = w.word.charAt(0).toUpperCase() + w.word.slice(1);
    document.getElementById('review-answer').classList.add('hidden');
    document.getElementById('review-answer').innerHTML = '';
    document.getElementById('review-sentences').classList.add('hidden');
    document.getElementById('review-sentences').innerHTML = '';
    document.getElementById('review-time').textContent = `Learned at: ${w.date}`;
    reviewData = w;
}

function showReviewAnswer() {
    const a = document.getElementById('review-answer');
    const settings = getCurrentSettings();
    const tr1 = getTranslation(reviewData.word, settings.transLang1);
    const tr2 = getTranslation(reviewData.word, settings.transLang2);
    a.innerHTML = `${LANGS[settings.transLang1].native}: ${tr1}<br>${LANGS[settings.transLang2].native}: ${tr2}`;
    a.classList.remove('hidden');

    // Show sentences
    const panel = document.getElementById('review-sentences');
    panel.classList.remove('hidden');
    _sentenceShuffle['review-sentences'] = null;
    renderSentences(reviewData.word, 'review-sentences');
}

function reviewNext() {
    reviewIndex++;
    if (reviewIndex < reviewWords.length) { showReviewWord(); }
    else { showEmpty('All reviewed!\n已全部复习!'); }
}

// Utility
function showEmpty(msg) {
    document.getElementById('empty-msg').textContent = msg;
    showPage('empty');
}

function speakWord(text, lang) {
    if (!text) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-US';
    u.rate = 0.85;
    speechSynthesis.speak(u);
}

// Bind events
document.getElementById('new-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') createUserAction();
});

window.exportUser = exportUser;
window.importUser = importUser;

// Init
autoRestore();
updateMenuButtons();

// PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js').then(function(reg) { reg.update(); });
    });
    navigator.serviceWorker.ready.then(function(reg) {
        reg.addEventListener('updatefound', function() {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    document.getElementById('update-banner').style.display = 'block';
                }
            });
        });
    });
}

function installUpdate() {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(function(reg) { reg.waiting.postMessage('skipWaiting'); });
    }
    window.location.reload();
}
</script>
</body>
</html>
